<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexcrawl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="map-canvas"></canvas>

  <div id="event-panel" style="display:none">
    <div id="event-placeholder">Take a step to discover what lies ahead...</div>
    <div id="current-event" style="display:none">
      <div class="event-header">
        <span id="event-badge" class="event-badge"></span>
        <span id="event-biome-tag" class="event-biome-tag"></span>
      </div>
      <div id="event-title" class="event-title"></div>
      <div id="event-desc" class="event-desc"></div>
    </div>
    <div id="event-log-section" style="display:none">
      <div class="event-log-divider"></div>
      <div id="event-log-list"></div>
    </div>
  </div>

  <div id="players-panel" style="display:none">
    <h3>Party</h3>
    <div id="party-list"></div>
  </div>

  <div id="hud">
    <span id="player-count"></span>
    <span id="world-time"></span>
    <span id="current-biome"></span>
    <span id="step-count"></span>
    <span id="vote-status"></span>
    <span id="status"></span>
    <button id="gm-toggle" style="display:none; margin-left: 20px; padding: 5px 10px; background: #555; color: #fff; border: 1px solid #888; border-radius: 3px; cursor: pointer;">GM View: OFF</button>
    <button id="new-game-btn" style="display:none; margin-left: 8px; padding: 5px 10px; background: #3a2a4a; color: #fff; border: 1px solid #888; border-radius: 3px; cursor: pointer;">New Game</button>
  </div>

  <div id="hex-tooltip"></div>
  <div id="settlement-card"></div>

  <div id="lobby">
    <div id="lobby-box">
      <h1>Hexcrawl</h1>

      <p class="lobby-label">Your Name</p>
      <input type="text" id="player-name" maxlength="20"
             placeholder="Enter adventurer name..." autocomplete="off">

      <p class="lobby-label">Choose Your Class</p>
      <div id="class-grid">
        <div class="class-card" data-class="warrior">
          <span class="class-icon">⚔️</span>
          <span class="class-name">Warrior</span>
          <span class="class-desc">Hardy fighter and shield-bearer of the realm</span>
        </div>
        <div class="class-card" data-class="ranger">
          <span class="class-icon">🏹</span>
          <span class="class-name">Ranger</span>
          <span class="class-desc">Scout, archer, wilderness survivalist</span>
        </div>
        <div class="class-card" data-class="mage">
          <span class="class-icon">🔮</span>
          <span class="class-name">Mage</span>
          <span class="class-desc">Arcane power, keeper of ancient spells</span>
        </div>
        <div class="class-card" data-class="rogue">
          <span class="class-icon">🗡️</span>
          <span class="class-name">Rogue</span>
          <span class="class-desc">Stealthy, cunning, strikes from shadows</span>
        </div>
      </div>

      <div id="lobby-error"></div>
      <button id="join-btn" disabled>Enter the Realm</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="worldmap.js"></script>
  <script src="battlemap.js"></script>
  <script src="game.js"></script>
</body>
</html>
