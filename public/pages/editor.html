<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Editor — Hexcrawl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #c9a84c;
      font-family: Georgia, serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 46px;
      background: #0d0d0d;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #header h1 {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9a84c;
      white-space: nowrap;
      margin-right: 4px;
    }

    .sep { width: 1px; height: 22px; background: #252520; flex-shrink: 0; }

    .hdr-label {
      font-size: 0.66rem;
      color: #4a4540;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #input-name {
      background: #181510;
      border: 1px solid #2a2520;
      border-radius: 4px;
      color: #e0d8c8;
      font-family: Georgia, serif;
      font-size: 0.88rem;
      padding: 4px 10px;
      width: 190px;
      outline: none;
    }
    #input-name:focus { border-color: #c9a84c; }

    .size-input {
      background: #181510;
      border: 1px solid #2a2520;
      border-radius: 4px;
      color: #e0d8c8;
      font-family: Georgia, serif;
      font-size: 0.85rem;
      padding: 4px 6px;
      width: 50px;
      outline: none;
      text-align: center;
    }
    .size-input:focus { border-color: #c9a84c; }

    .hdr-x { color: #333; font-size: 0.8rem; }

    .hdr-btn {
      background: #181510;
      border: 1px solid #2a2520;
      border-radius: 4px;
      color: #a09060;
      font-family: Georgia, serif;
      font-size: 0.76rem;
      padding: 5px 11px;
      cursor: pointer;
      letter-spacing: 0.05em;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .hdr-btn:hover { background: #242010; border-color: #c9a84c; color: #c9a84c; }
    .hdr-btn.warn  { color: #8a4040; border-color: #3a2020; }
    .hdr-btn.warn:hover { background: #1e1010; border-color: #9a4040; color: #c06060; }

    /* ---- Toolbar ---- */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 5px 14px;
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .tool-btn {
      background: #181510;
      border: 1px solid #252520;
      border-radius: 4px;
      color: #6a6050;
      font-family: Georgia, serif;
      font-size: 0.76rem;
      padding: 4px 12px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tool-btn .key {
      font-family: monospace;
      font-size: 0.6rem;
      color: #2e2c28;
      border: 1px solid #222;
      border-radius: 2px;
      padding: 0 3px;
      line-height: 1.4;
    }
    .tool-btn:hover  { background: #222015; color: #c9a84c; }
    .tool-btn.active { background: #1e1a0c; border-color: #c9a84c; color: #c9a84c; }
    .tool-btn.active .key { color: #7a6030; border-color: #3a3020; }

    .tbsep { width: 1px; height: 20px; background: #222; margin: 0 5px; }

    .icon-btn {
      background: #181510;
      border: 1px solid #252520;
      border-radius: 4px;
      color: #6a6050;
      font-family: Georgia, serif;
      font-size: 0.76rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .icon-btn:hover:not(:disabled) { background: #222015; color: #c9a84c; }
    .icon-btn:disabled { opacity: 0.28; cursor: not-allowed; }

    #selected-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.76rem;
      color: #4a4540;
    }
    #selected-tile-swatch {
      width: 16px; height: 16px;
      border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.55);
      flex-shrink: 0;
    }
    #selected-tile-name { color: #c9a84c; }

    /* ---- Main layout ---- */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ---- Palette ---- */
    #palette {
      width: 155px;
      background: #0d0d0d;
      border-right: 1px solid #1a1a1a;
      overflow-y: auto;
      flex-shrink: 0;
      padding: 6px 5px;
    }
    #palette::-webkit-scrollbar { width: 5px; }
    #palette::-webkit-scrollbar-track { background: #0a0a0a; }
    #palette::-webkit-scrollbar-thumb { background: #252525; border-radius: 3px; }

    .palette-cat {
      font-size: 0.58rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #3a3830;
      padding: 8px 4px 4px;
      border-bottom: 1px solid #181818;
      margin-bottom: 3px;
    }
    .palette-cat:first-child { padding-top: 2px; }

    .palette-tile {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      background: none;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 4px 5px;
      cursor: pointer;
      color: #6a6050;
      font-family: Georgia, serif;
      font-size: 0.76rem;
      text-align: left;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      margin-bottom: 1px;
    }
    .palette-tile:hover   { background: #181510; color: #c9a84c; }
    .palette-tile.selected { background: #1e1a0c; border-color: #c9a84c; color: #c9a84c; }

    .palette-swatch {
      width: 18px; height: 18px;
      border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.55);
    }

    .palette-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---- Canvas ---- */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #080706;
    }

    #editor-canvas {
      display: block;
      cursor: crosshair;
      outline: none;
    }

    /* ---- Status bar ---- */
    #statusbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 14px;
      height: 26px;
      background: #0d0d0d;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
      font-size: 0.72rem;
      color: #3a3830;
    }
    #status-pos  { color: #5a5548; min-width: 60px; }
    #status-tile { color: #6a5a38; min-width: 120px; }
    #status-tool { color: #4a4840; }
    #status-size { color: #3a3830; }
    .sbsep { color: #1e1e1e; }
    #status-hint { margin-left: auto; color: #252520; font-size: 0.66rem; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Dungeon Editor</h1>
    <div class="sep"></div>
    <span class="hdr-label">Name</span>
    <input type="text" id="input-name" value="Untitled Dungeon" maxlength="60" spellcheck="false">
    <div class="sep"></div>
    <span class="hdr-label">Size</span>
    <input type="number" id="input-width"  class="size-input" value="40" min="5" max="100">
    <span class="hdr-x">×</span>
    <input type="number" id="input-height" class="size-input" value="30" min="5" max="100">
    <button id="btn-resize" class="hdr-btn">Resize</button>
    <div class="sep"></div>
    <button id="btn-new"  class="hdr-btn warn">New</button>
    <button id="btn-load" class="hdr-btn">Load JSON</button>
    <button id="btn-save" class="hdr-btn">Save JSON</button>
    <button id="btn-fit"  class="hdr-btn">Fit View</button>
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>

  <div id="toolbar">
    <button class="tool-btn" data-tool="paint">Paint <span class="key">B</span></button>
    <button class="tool-btn" data-tool="erase">Erase <span class="key">E</span></button>
    <button class="tool-btn" data-tool="fill">Fill <span class="key">F</span></button>
    <button class="tool-btn" data-tool="rect">Rect <span class="key">R</span></button>
    <button class="tool-btn" data-tool="pick">Pick <span class="key">P</span></button>
    <div class="tbsep"></div>
    <button id="btn-undo" class="icon-btn">↩ Undo</button>
    <button id="btn-redo" class="icon-btn">↪ Redo</button>
    <div id="selected-info">
      Selected: <span id="selected-tile-swatch"></span><span id="selected-tile-name">Wall</span>
    </div>
  </div>

  <div id="main">
    <div id="palette"></div>
    <div id="canvas-wrap">
      <canvas id="editor-canvas" tabindex="0"></canvas>
    </div>
  </div>

  <div id="statusbar">
    <span id="status-pos"></span>
    <span id="status-tile"></span>
    <span class="sbsep">|</span>
    <span id="status-tool">Tool: paint</span>
    <span class="sbsep">|</span>
    <span id="status-size">40 × 30</span>
    <span id="status-hint">Right-click or middle-drag to pan · Scroll to zoom · Ctrl+Z undo</span>
  </div>

  <script src="/editor.js"></script>
</body>
</html>
